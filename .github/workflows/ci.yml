name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  static-and-container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: python -m pip install uv==0.11.6
      - run: uvx --from ruff==0.15.22 ruff check .
      - run: uvx --from bandit==1.9.4 bandit -r src -ll
      - run: docker build -f docker/verifier.Dockerfile -t sisyphus-harness-verifier:ci .
      - name: Probe real verifier container boundary
        env:
          SISYPHUS_DOCKER_INTEGRATION: "1"
          SISYPHUS_VERIFIER_IMAGE: sisyphus-harness-verifier:ci
          PYTHONPATH: src
        run: python -m unittest tests.test_docker_verifier_integration -v
      - name: Validate verifier Compose boundary
        env:
          SISYPHUS_BUNDLE_STORE: /tmp/sisyphus-bundles
          SISYPHUS_VERIFICATION_STAGING: /tmp/sisyphus-staging
          SISYPHUS_VERIFICATION_REQUEST: /tmp/sisyphus-request.json
        run: docker compose config --quiet

  core:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.14"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install uv==0.11.6
      - run: uv sync --frozen --group dev
      - run: uv run --frozen --group dev coverage run --branch -m unittest discover -s tests -t .
      - run: uv run --frozen --group dev coverage report -m

  evolution:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: python -m pip install uv==0.11.6
      - run: uv sync --frozen --extra evolution --no-group dev
      - run: uv run --frozen --extra evolution --no-group dev python -m unittest tests.test_gepa_integration -v

  package-and-evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: python -m pip install uv==0.11.6
      - run: uv sync --frozen --group dev
      - run: python evidence/qwen30b-final/verify_manifest.py
      - run: uv lock --check
      - run: python -m compileall -q src tests benchmarks
      - name: Check pull request whitespace
        if: github.event_name == 'pull_request'
        run: git diff --check ${{ github.event.pull_request.base.sha }}...HEAD
      - name: Check pushed commit whitespace
        if: github.event_name == 'push'
        run: git show --check --format= HEAD
      - run: uv build --offline
      - run: python -m venv /tmp/sisyphus-harness-wheel
      - run: /tmp/sisyphus-harness-wheel/bin/python -m pip install --no-index --no-deps dist/*.whl
      - run: cd /tmp && /tmp/sisyphus-harness-wheel/bin/sisyphus-harness --help
